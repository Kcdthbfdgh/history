
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Елагин остров — архитектурный маршрут</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body {
    margin: 0;
    font-family: "Inter", sans-serif;
    background: #020617;
    color: #e2e8f0;
}

/* NAV */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    backdrop-filter: blur(10px);
    background: rgba(2,6,23,0.6);
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 15px;
    z-index: 1000;
}

/* HERO */
.hero {
    height: 100vh;
    background: url("https://upload.wikimedia.org/wikipedia/commons/6/6c/Yelagin_Palace_St_Petersburg.jpg") center/cover fixed;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
}

.hero::after {
    content:"";
    position:absolute;
    inset:0;
    background: rgba(0,0,0,0.55);
}

.hero h1 {
    position: relative;
    font-family: "Playfair Display";
    font-size: 54px;
}

/* SECTIONS */
.section {
    padding: 90px 10%;
}

/* LUXURY CARDS */
.card {
    display: flex;
    gap: 25px;
    background: rgba(30,41,59,0.55);
    border-radius: 18px;
    overflow: hidden;
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.08);
    transition: 0.5s;
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 30px 80px rgba(0,0,0,0.7);
}

/* IMAGE */
.card img {
    width: 40%;
    object-fit: cover;
    min-height: 220px;
}

/* CONTENT */
.card-content {
    padding: 20px;
}

.badge {
    display: inline-block;
    padding: 5px 10px;
    background: rgba(96,165,250,0.15);
    color: #60a5fa;
    border-radius: 999px;
    font-size: 12px;
    margin-bottom: 10px;
}

/* MAP */
#map {
    height: 520px;
    border-radius: 18px;
}

/* ACTIVE */
.active-step {
    border: 2px solid #60a5fa;
    box-shadow: 0 0 30px rgba(96,165,250,0.6);
}

/* REVEAL */
.reveal {
    opacity: 0;
    transform: translateY(50px);
    transition: 0.8s;
}

.reveal.active {
    opacity: 1;
    transform: translateY(0);
}

/* RESPONSIVE */
@media(max-width: 768px) {
    .card {
        flex-direction: column;
    }

    .card img {
        width: 100%;
    }

    .hero h1 {
        font-size: 34px;
        padding: 0 20px;
    }
}

</style>
</head>

<body>

<nav>
    <a href="#route">Маршрут</a>
    <a href="#map-section">Карта</a>
</nav>

<div class="hero">
    <h1>Елагин остров<br><span style="font-size:18px;opacity:0.7;">архитектурная экскурсия</span></h1>
</div>

<div class="section" id="route">

<!-- CARD TEMPLATE -->

<div class="card reveal" data-step="1">
<img src="images/palace.jpg" alt="">
<div class="card-content">
<div class="badge">Главная точка</div>
<h2>Елагин дворец</h2>
</div>
</div>

<br>

<div class="card reveal" data-step="2">
<img src="images/kitchen.jpg" alt="">
<div class="card-content">
<div class="badge">Историческое здание</div>
<h2>Кухонный корпус</h2>
</div>
</div>

<br>

<div class="card reveal" data-step="3">
<img src="images/orangery.jpg" alt="">
<div class="card-content">
<div class="badge">Оранжерея</div>
<h2>Оранжерея</h2>
</div>
</div>

<br>

<div class="card reveal" data-step="4">
<img src="images/pavilion.jpg" alt="">
<div class="card-content">
<div class="badge">Павильон</div>
<h2>Павильон</h2>
</div>
</div>

<br>

<div class="card reveal" data-step="5">
<img src="images/lions.jpg" alt="">
<div class="card-content">
<div class="badge">Набережная</div>
<h2>Пристань со львами</h2>
</div>
</div>

</div>

<div class="section" id="map-section">
<h2>Карта маршрута</h2>
<div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-polylinedecorator/dist/leaflet.polylineDecorator.min.js"></script>

<script>

// MAP
const map = L.map('map').setView([59.985, 30.26], 15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// REAL COORDINATES
const points = [
    [59.9856, 30.2572],
    [59.9862, 30.2598],
    [59.9871, 30.2629],
    [59.9847, 30.2623],
    [59.9826, 30.2586]
];

// MARKERS
points.forEach((p, i) => {
    const marker = L.marker(p).addTo(map);
    marker.on("click", () => highlightStep(i+1));
});

// ROUTE LINE
let polyline = L.polyline([], {color: '#22d3ee', weight: 3}).addTo(map);

let i = 0;
function drawLine() {
    if(i < points.length) {
        polyline.addLatLng(points[i]);
        i++;
        setTimeout(drawLine, 500);
    }
}
drawLine();

// ARROWS
setTimeout(() => {
    const decorator = L.polylineDecorator(polyline, {
        patterns: [
            {
                offset: 10,
                repeat: 25,
                symbol: L.Symbol.arrowHead({
                    pixelSize: 10,
                    polygon: false,
                    pathOptions: {stroke: true}
                })
            }
        ]
    }).addTo(map);
}, 3000);

// STORY HIGHLIGHT
const steps = document.querySelectorAll(".card");

function highlightStep(id){
    steps.forEach(s => s.classList.remove("active-step"));
    const el = document.querySelector(`[data-step="${id}"]`);
    if(el){
        el.classList.add("active-step");
        el.scrollIntoView({behavior:"smooth", block:"center"});
    }
}

// SCROLL STORY
window.addEventListener("scroll", () => {
    steps.forEach((el, index) => {
        const rect = el.getBoundingClientRect();
        if(rect.top < window.innerHeight * 0.7){
            el.classList.add("active-step");
            map.setView(points[index], 16);
        }
    });
});

// REVEAL
const reveals = document.querySelectorAll(".reveal");

window.addEventListener("scroll", () => {
    reveals.forEach(el => {
        if(el.getBoundingClientRect().top < window.innerHeight - 100){
            el.classList.add("active");
        }
    });
});

</script>

</body>
</html>
